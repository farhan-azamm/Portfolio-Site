<body>

  <p class="turn-hint">On mobile, swipe or tap a page side to navigate.</p>

  <div class="flipbook">
    <div>
      <img src="1.png" alt="" />
    </div>
    <div>

    </div>
    <div>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  <script>
    var $flipbook = $(".flipbook");

    function getViewportHeight() {
      return window.visualViewport ? window.visualViewport.height : window.innerHeight;
    }

    // Decide sizing + display mode based on screen width
    function getSettings() {
      var isMobile = $(window).width() <= 768;
      var isCompact = $(window).width() <= 1100;
      var maxW = Math.min(
        isMobile ? $(window).width() * 0.95 : $(window).width() - 260,
        isMobile ? 700 : 1400
      );
      // Use nearly the full viewport, leaving only room for the instruction above.
      var maxH = getViewportHeight() - (isCompact ? 160 : 64);

      var width, height;
      if (isMobile) {
        // Single page: match the magazine artwork's 2:3 portrait ratio.
        width = Math.min(maxW, maxH * (2 / 3));
        height = width * (3 / 2);
      } else {
        // Two 2:3 pages side by side create a 4:3 book.
        width = Math.min(maxW, maxH * (4 / 3));
        height = width * (3 / 4);
      }

      return {
        width: width,
        height: height,
        display: isMobile ? "single" : "double"
      };
    }

    var settings = getSettings();

    $flipbook.turn({
      width: settings.width,
      height: settings.height,
      display: settings.display,
      autoCenter: false,
      duration: 600,
      acceleration: true,
      gradients: true
    });

    var $socialLinks = $(".social-links");
    var $turnHint = $(".turn-hint");

    function positionSocialLinks() {
      if ($(window).width() <= 1100) {
        $socialLinks.css("left", "");
        return;
      }

      var bookLeft = $flipbook.offset().left;
      var panelWidth = $socialLinks.outerWidth();
      $socialLinks.css("left", Math.max(16, bookLeft - panelWidth - 24));
    }

    function positionTurnHint() {
      var bookTop = $flipbook.offset().top;
      var hintHeight = $turnHint.outerHeight();
      var hintGap = 16;
      var isCompact = $(window).width() <= 1100;
      var hintLeft = isCompact
        ? $(window).width() / 2
        : $flipbook.offset().left + $flipbook.width() * 0.75;

      $turnHint.css({
        left: hintLeft,
        top: Math.max(8, bookTop - hintHeight - hintGap)
      });
    }

    positionSocialLinks();
    positionTurnHint();

    // Re-check on resize/orientation change
    function resizeFlipbook() {
      var s = getSettings();
      var current = $flipbook.turn("display");

      if (current !== s.display) {
        $flipbook.turn("display", s.display);
      }

      $flipbook.turn("size", s.width, s.height);
      positionSocialLinks();
      positionTurnHint();
    }

    $(window).on("resize orientationchange", resizeFlipbook);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resizeFlipbook);
    }

    // Turn.js only recognises drags that begin in a small corner area. On touch
    // screens the active page layer can change, making that hit area unreliable.
    // Handle phone gestures at the book level instead, so every visible page has
    // the same swipe and side-tap behaviour.
    (function addMobileNavigation() {
      var startX = 0;
      var startY = 0;
      var startTime = 0;
      var mobileQuery = window.matchMedia("(max-width: 768px)");
      var book = $flipbook[0];

      book.addEventListener("touchstart", function (event) {
        if (!mobileQuery.matches) return;
        event.stopImmediatePropagation();
        if (event.touches.length !== 1) return;
        var touch = event.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        startTime = Date.now();
      }, { capture: true, passive: true });

      book.addEventListener("touchmove", function (event) {
        if (mobileQuery.matches) event.stopImmediatePropagation();
      }, { capture: true, passive: true });

      book.addEventListener("touchend", function (event) {
        if (!mobileQuery.matches) return;
        event.stopImmediatePropagation();
        if (!startTime || $flipbook.turn("animating")) {
          startTime = 0;
          return;
        }

        var touch = event.changedTouches[0];
        var deltaX = touch.clientX - startX;
        var deltaY = touch.clientY - startY;
        var elapsed = Date.now() - startTime;
        var isSwipe = Math.abs(deltaX) >= 40 && Math.abs(deltaX) > Math.abs(deltaY);
        var bookBounds = book.getBoundingClientRect();
        var sideTap = elapsed < 350 && Math.abs(deltaX) < 12 && Math.abs(deltaY) < 12;

        startTime = 0;

        if (isSwipe) {
          $flipbook.turn(deltaX < 0 ? "next" : "previous");
        } else if (sideTap) {
          if (touch.clientX > bookBounds.left + bookBounds.width * 0.66) {
            $flipbook.turn("next");
          } else if (touch.clientX < bookBounds.left + bookBounds.width * 0.34) {
            $flipbook.turn("previous");
          }
        }
      }, { capture: true, passive: true });
    })();

    window.addEventListener("wheel", function (event) {
      event.preventDefault();
    }, { passive: false });

    window.addEventListener("keydown", function (event) {
      var scrollKeys = [" ", "ArrowUp", "ArrowDown", "PageUp", "PageDown", "Home", "End"];

      if (scrollKeys.indexOf(event.key) !== -1) {
        event.preventDefault();
      }
    });

    window.addEventListener("scroll", function () {
      window.scrollTo(0, 0);
    }, { passive: true });
  </script>
</body>

</html>
